<!DOCTYPE html>
<html>
<head>
<title>ImageResizePro</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

.container{
background:white;
padding:20px;
margin:50px auto;
width:350px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:darkblue;
}

input{
padding:5px;
margin:5px;
}
</style>

</head>

<body>

<div class="container">

<h2>ImageResizePro</h2>
<p>Resize your image easily</p>

<input type="file" id="upload"><br><br>

<label>Width:</label>
<input type="number" id="width"><br><br>

<label>Height:</label>
<input type="number" id="height"><br><br>

<button onclick="resizeImage()">Resize Image</button>

<br><br>

<canvas id="canvas" style="display:none;"></canvas>

<br>

<a id="download" style="display:none;">Download Image</a>

<hr>

<h3>KB to MB Converter</h3>
<input type="number" id="kb">
<button onclick="kbToMb()">Convert</button>
<p id="kbmb"></p>

</div>

<script>

function resizeImage(){

var file=document.getElementById("upload").files[0];
var width=document.getElementById("width").value;
var height=document.getElementById("height").value;

var reader=new FileReader();

reader.onload=function(e){

var img=new Image();

img.onload=function(){

var canvas=document.getElementById("canvas");
var ctx=canvas.getContext("2d");

canvas.width=width;
canvas.height=height;

ctx.drawImage(img,0,0,width,height);

var link=document.getElementById("download");

link.href=canvas.toDataURL();
link.download="resized-image.png";
link.style.display="block";
link.innerHTML="Download Image";

}

img.src=e.target.result;

}

reader.readAsDataURL(file);

}

function kbToMb(){
var kb=document.getElementById("kb").value;
var mb=kb/1024;
document.getElementById("kbmb").innerHTML=mb+" MB";
}

</script>

</body>
</html>
