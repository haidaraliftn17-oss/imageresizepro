<!DOCTYPE html>
<html>
<head>
<title>Simple Tools</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

.container{
background:white;
padding:30px;
margin:50px auto;
width:400px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:darkblue;
}

input{
padding:6px;
margin:5px;
}
</style>

</head>

<body>

<div class="container">

<h2>MB to KB Converter</h2>

<input type="number" id="mb" placeholder="Enter MB">
<button onclick="mbToKb()">Convert</button>

<p id="result"></p>

<hr>

<h2>Image to PDF Converter</h2>

<input type="file" id="imageInput" accept="image/png, image/jpeg">
<br><br>

<button onclick="convertToPDF()">Convert to PDF</button>

</div>

<script>

function mbToKb(){

var mb=document.getElementById("mb").value;
var kb=mb*1024;

document.getElementById("result").innerHTML=kb+" KB";

}

/* Image to PDF */

function convertToPDF(){

var file=document.getElementById("imageInput").files[0];

if(!file){
alert("Upload image first");
return;
}

var reader=new FileReader();

reader.onload=function(e){

var img=new Image();

img.onload=function(){

var canvas=document.createElement("canvas");
var ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

var imgData=canvas.toDataURL("image/jpeg");

var pdfWindow=window.open("");

pdfWindow.document.write(
"<iframe width='100%' height='100%' src='"+imgData+"'></iframe>"
);

}

img.src=e.target.result;

}

reader.readAsDataURL(file);

}

</script>

</body>
</html>
